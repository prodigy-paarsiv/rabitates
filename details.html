  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zylo Product</title>
  <link rel="stylesheet" href="style.css">
  <script type="text/javascript" src="//cdn.evgnet.com/beacon/socialbeatdigitalmarketing/rabitat/scripts/evergage.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #f5f5f5;
  }

  /* Header and footer use shared styles from style.css */

  /* BANNER IMAGE */
  .banner {
    width: 100%;
    /* height: 400px;  */
    background: url('image.png') center/cover no-repeat;
  }

  /* PRODUCT SECTION */
  .container {
    display: flex;
    max-width: 1200px;
    margin: 30px auto;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
  }

  /* LEFT */
  .left {
    width: 50%;
    background: #f2dfc2;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .left img {
    max-height: 500px;
  }

  /* RIGHT */
  .right {
    width: 50%;
    padding: 40px;
  }

  .price { display: flex; gap: 10px; align-items: center; }
  .current { color: red; font-size: 32px; }
  .price .current,
  .price .off {
    text-decoration: none;
  }
  .price .old {
    text-decoration: line-through;
    color: #999;
  }
  .off { background: red; color: white; padding: 4px 8px; }

  .colors {
    display: flex;
    gap: 10px;
    margin: 15px 0;
  }
  .color-box {
    width: 40px;
    height: 50px;
    background: skyblue;
    cursor: pointer;
  }
  .color-box.active { border: 2px solid black; }

  .cart-btn {
    width: 100%;
    padding: 15px;
    background: #4a90e2;
    color: white;
    border: none;
    margin-top: 10px;
  }

  /* OFFERS */
  .offers {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  .offer-box {
    flex: 1;
    border: 2px solid #6ea8fe;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    position: relative;
  }

  .tag {
    position: absolute;
    top: -10px;
    right: 10px;
    color: white;
    padding: 4px 8px;
  }
  .blue { background: blue; }
  .red { background: red; }

  /* TABS */
  .tabs { margin-top: 20px; }
  .tab {
    padding: 10px;
    margin-right: 10px;
    cursor: pointer;
    background-color: rgb(232, 232, 232);
    border-radius: 3px;
  }
  .tab.active { background: blue; color: white; }

  .tab-content { display: none; margin-top: 10px; }
  .tab-content.active { display: block; }


  /* WHATSAPP */
  .whatsapp {
    position: fixed;
    right: 20px;
    bottom: 20px;
    background: #25d366;
    color: white;
    width: 55px;
    height: 55px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
  }

  .responsive-promo {
    width: min(1200px, 95%);
    margin: 20px auto;
  }

  .responsive-promo img {
    width: 100%;
    display: block;
    border-radius: 8px;
  }

  .text-container {
display: flex;
justify-content: center;
  }
  /* DARK SLIDER SECTION */
.slider-section {
  background: #111;
  padding: 40px 0;
  position: relative;
  margin-top: 30px;
}

/* SCROLL CONTAINER */
.slider {
  display: flex;
  overflow-x: auto;
  scroll-behavior: smooth;
  gap: 20px;
  padding: 0 60px;
}

.slider::-webkit-scrollbar {
  display: none;
}

/* CARD */
.slide {
  min-width: 250px;
  height: 350px;
  border-radius: 15px;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* DARK OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  cursor: pointer;
  border-radius: 50%;
  z-index: 10;
}

.left-arrow { left: 10px; }
.right-arrow { right: 10px; }

  .desktop-image { display: block; }
  .mobile-image { display: none; }

.musthave-section {
  width: min(1200px, 95%);
  margin: 24px auto 10px;
  padding-bottom: 20px;
}

.musthave-title {
  text-align: center;
  font-size: 46px;
  margin-bottom: 22px;
  color: #212121;
  letter-spacing: 0.5px;
}

.musthave-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}

.musthave-card {
  background: #fff;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
}

.musthave-image-wrap {
  background: #e7eff7;
  aspect-ratio: 1 / 1;
}

.musthave-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.musthave-info {
  padding: 10px 0 0;
}

.musthave-name {
  font-size: 25px;
  line-height: 1.15;
  color: #232323;
  margin-bottom: 8px;
}

.musthave-rating {
  font-size: 18px;
  color: #444;
  margin-bottom: 8px;
}

.musthave-rating .star {
  color: #f5b400;
}

.musthave-price {
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 32px;
  margin-bottom: 14px;
}

.musthave-price .compare {
  color: #8d8d8d;
  text-decoration: line-through;
  font-size: 34px;
}

.musthave-btn {
  width: 100%;
  border: none;
  background: #f22646;
  color: #fff;
  padding: 12px;
  font-size: 20px;
  border-radius: 0 0 6px 6px;
  cursor: pointer;
  font-weight: 700;
}

@media (max-width: 1024px) {
  .musthave-title { font-size: 38px; }
  .musthave-name { font-size: 24px; }
  .musthave-rating { font-size: 16px; }
  .musthave-price { font-size: 24px; }
  .musthave-price .compare { font-size: 24px; }
  .musthave-btn { font-size: 20px; }
}

  @media (max-width: 769px) {
    .desktop-image { display: none; }
    .mobile-image { display: block; }
    .musthave-grid { grid-template-columns: 1fr; }
    .musthave-title { font-size: 32px; }
    .musthave-btn { font-size: 18px; }
  }

  </style>
  </head>

  <body>

<div id="site-header"></div>

  <!-- BANNER -->
  <div class="banner"></div>

  <!-- PRODUCT -->
  <div class="container">
    <div class="left">
      <img
        id="detailImage"
        src="https://www.rabitat.com/cdn/shop/files/Artboard2_d1e9da1d-6a25-458e-83d1-41758f491d28.jpg?v=1770634794&width=2000"
      >
    </div>

    <div class="right">
      <h1 id="detailName">Zylo Special Edition</h1>
      <p id="detailSub">4-8 Years | 550 ml</p>

      <div class="price">
        <span class="current" id="detailPrice">₹999</span>
        <span class="old" id="detailCompare">₹1999</span>
        <span class="off" id="detailOff">50% OFF</span>
      </div>

      <p>Color: <span id="colorName">Blue</span></p>

      <div class="colors">
        <div class="color-box active" data-name="Blue"></div>
        <div class="color-box" style="background:yellow" data-name="Yellow"></div>
      </div>

      <button class="cart-btn">Add To Cart</button>

      <!-- TABS -->
      <div class="tabs">
        <span class="tab active" data-tab="desc">Description</span>
        <span class="tab" data-tab="spec">Specification</span>
        <span class="tab" data-tab="spec">Shipping info</span>
      </div>

      <div id="desc" class="tab-content active">
        <p>.High quality steel bottle.</p>
      </div>
      <div id="spec" class="tab-content">
        <p>550ml capacity.</p>
      </div>

    </div>


  </div>
  <div class="responsive-promo">
    <img
      class="desktop-image"
      src="https://www.rabitat.com/cdn/shop/files/Artboard_2_ad149063-9bdf-4f7e-9d00-1195d5a48401.jpg?v=1736251829"
      alt="Desktop image"
    >
    <img
      class="mobile-image"
      src="https://www.rabitat.com/cdn/shop/files/Artboard_3_5196f62d-d0f7-4b82-bec8-b9add52ec606.jpg?v=1736251829"
      alt="Mobile image"
      >


      <img
      class="mobile-image"
      src="https://www.rabitat.com/cdn/shop/files/Artboard_4_44219b79-02a1-4e50-9248-fd18a45319b6.jpg?v=1736251828"
      alt="Mobile image"
    >
    <img
    class="mobile-image"
    src="https://www.rabitat.com/cdn/shop/files/Artboard_5_8eaee9d0-1592-437f-90c3-2106b672aab6.jpg?v=1736251829"
    alt="Mobile image"
  >

  <img
  class="mobile-image"
  src="//www.rabitat.com/cdn/shop/files/Artboard_9_5ee48d0c-e78a-4731-83b7-f4fa4ced946f.jpg?v=1736251828"
  alt="Mobile image"
>


<section class="musthave-section">
  <h2 class="musthave-title">Similar Products</h2>
  <div class="musthave-grid" id="mustHaveGrid"></div>
</section>




  </div>

 


  <div id="site-footer"></div>

  <div class="whatsapp">💬</div>

  <script src="./products-data.js"></script>
  <script>
  function getAllProducts() {
    const src = window.PRODUCT_DATA || {};
    return []
      .concat(src.homePrimary || [])
      .concat(src.homeSecondary || [])
      .concat(src.rabitTab1 || [])
      .concat(src.rabitTab2 || []);
  }

  function applyProductDetails() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    if (!id) return null;

    const product = getAllProducts().find((p) => p.id === id);
    if (!product) return null;

    const img = document.getElementById("detailImage");
    const name = document.getElementById("detailName");
    const sub = document.getElementById("detailSub");
    const price = document.getElementById("detailPrice");
    const compare = document.getElementById("detailCompare");
    const off = document.getElementById("detailOff");
    const colorName = document.getElementById("colorName");

    if (img && product.image) img.src = product.image;
    if (img && product.name) img.alt = product.name;
    if (name && product.name) name.textContent = product.name;
    if (sub && product.sub) sub.textContent = product.sub;
    if (price && product.price) price.textContent = product.price;
    if (compare && product.compare) compare.textContent = product.compare;
    if (off && product.off) off.textContent = product.off;
    if (colorName && product.variant) colorName.textContent = product.variant;
    if (product.name) document.title = product.name + " | Rabitat";

    return product;
  }

  const product = applyProductDetails();

  function getMustHaveProducts(currentProductId) {
    const src = window.PRODUCT_DATA || {};
    const addOnPool = []
      .concat(src.rabitTab1 || [])
      .concat(src.rabitTab2 || [])
      .concat(src.homeSecondary || []);

    return addOnPool
      .filter((p) => p && p.id && p.id !== currentProductId)
      .slice(0, 3);
  }

  function renderMustHaveAddOns(items) {
    const grid = document.getElementById("mustHaveGrid");
    if (!grid || !Array.isArray(items)) return;

    grid.innerHTML = items
      .map((p) => {
        const rating = p.rating || "4.6";
        const reviews = Math.max(10, Math.round(Number(rating) * 12));
        return `
          <article class="musthave-card" data-id="${p.id}">
            <div class="musthave-image-wrap">
              <img src="${p.image}" alt="${p.name}">
            </div>
            <div class="musthave-info">
              <h3 class="musthave-name">${p.name}</h3>
              <p class="musthave-rating"><span class="star">★</span> ${rating} | ${reviews} Reviews</p>
              <div class="musthave-price">
                <span>${p.price}</span>
                <span class="compare">${p.compare || ""}</span>
              </div>
              <button class="musthave-btn xmas-add-to-cart">ADD TO CART</button>
            </div>
          </article>
        `;
      })
      .join("");
  }

  renderMustHaveAddOns(getMustHaveProducts(product ? product.id : ""));

  if (product) {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: "page_view",
      MCP: {
        pageType: "PDP Page",
        item: {
          id: product.id,
          name: product.name,
          url: window.location.href,
          imageUrl: product.image,
          description: product.sub || "",
          category: ["Kids Products"],
          productCategory: ["Bestsellers"],
          Industries: ["Kids"]
        }
      }
    });
  }

  // TIMER
  const timerEl = document.getElementById("timer");
  if (timerEl) {
    let t = 5000;
    setInterval(() => {
      let m = Math.floor(t / 60);
      let s = t % 60;
      timerEl.innerText = m + ":" + s;
      t--;
    }, 1000);
  }

  // COLOR SWITCH
  document.querySelectorAll(".color-box").forEach(b=>{
    b.onclick = ()=>{
      document.querySelector(".active").classList.remove("active");
      b.classList.add("active");
      document.getElementById("colorName").innerText = b.dataset.name;
    }
  });

  // TABS
  document.querySelectorAll(".tab").forEach(tab=>{
    tab.onclick = ()=>{
      document.querySelector(".tab.active").classList.remove("active");
      tab.classList.add("active");

      document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
      document.getElementById(tab.dataset.tab).classList.add("active");
    }
  });

  document.addEventListener("click", (event) => {
    const card = event.target.closest(".musthave-card");
    if (!card) return;
    if (event.target.closest("button, a")) return;
    const productId = card.dataset.id || "";
    window.location.href = productId
      ? `./details.html?id=${encodeURIComponent(productId)}`
      : "./details.html";
  });
  </script>
  <script src="./layout.js"></script>

  </body>
  </html>
